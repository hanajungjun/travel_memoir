name: travel_memoir
description: Travel Memoir project.

publish_to: 'none'


#version: 1.0.5+5
version: 1.0.0+57


environment:
  sdk: ">=3.10.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  
  firebase_core: ^3.6.0 
  firebase_messaging: ^15.2.10

  # HTML 파싱
  flutter_html: ^3.0.0-alpha.6

  # UI/기본 유틸
  overlay_support: ^2.1.0
  cupertino_icons: ^1.0.2
  url_launcher: ^6.3.2
  shared_preferences: ^2.2.2

  # Supabase
  supabase_flutter: ^2.5.6

  # 이미지/파일 처리
  cached_network_image: ^3.3.1
  path_provider: ^2.1.2
  permission_handler: ^11.3.1

  # ✅ 이미지 압축을 위한 필수 라이브러리
  flutter_image_compress: ^2.3.0

  # ✅ intl 버전을 flutter_map과 호환되는 범위로 조정 (0.20.2에서 낮춤)
  intl: ^0.20.2
  
  # ✅ flutter_map 설치 (버전을 명시하지 말고 일단 이렇게 써보세요)
  flutter_map: ^8.0.0
  mapbox_maps_flutter: ^2.4.0
  
  # ✅ latlong2 추가 (좌표용)
  latlong2: ^0.9.1
  
  # 기존에 있던 http 패키지도 확인
  http: ^1.1.0


  # 앱 아이콘
  flutter_launcher_icons: ^0.14.4

  # 로그인
  kakao_flutter_sdk_user: ^1.9.6
  sign_in_with_apple: ^6.1.0
  google_sign_in: ^6.2.1

  share_plus: ^10.0.0

  flutter_slidable: ^3.1.0
  fl_chart: ^0.66.2
  scrollable_clean_calendar: ^1.5.0
 
  gal: ^2.3.2
  google_mobile_ads: ^7.0.0  
  introduction_screen: ^4.0.0
  easy_localization: ^3.0.8
  lottie: ^3.1.2
  purchases_flutter: ^8.2.0 
  flutter_native_splash: ^2.4.7
  flutter_local_notifications: ^19.5.0
  connectivity_plus: ^7.0.0
  flutter_app_badge_control: ^0.0.2
  google_fonts: ^8.0.0
  image: ^4.1.3
  confetti: ^0.8.0
  wechat_assets_picker: ^9.3.2 

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2
  image_picker: ^1.1.2

dependency_overrides:
  flutter_math_fork: ^0.6.0
  win32: ^5.0.0
  intl: 0.20.2

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/onboard/
    - assets/geo/processed/
    - assets/geo/raw/
    - assets/translations/
    - assets/lottie/
    - assets/icons/
    - assets/fonts/

  fonts:
    - family: NotoSansKR
      fonts:
        - asset: assets/fonts/NotoSansKR-Thin.ttf
          weight: 100
        - asset: assets/fonts/NotoSansKR-ExtraLight.ttf
          weight: 200
        - asset: assets/fonts/NotoSansKR-Light.ttf
          weight: 300
        - asset: assets/fonts/NotoSansKR-Regular.ttf
          weight: 400
        - asset: assets/fonts/NotoSansKR-Medium.ttf
          weight: 500
        - asset: assets/fonts/NotoSansKR-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/NotoSansKR-Bold.ttf
          weight: 700
        - asset: assets/fonts/NotoSansKR-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/NotoSansKR-Black.ttf
          weight: 900
  
     
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.png"

flutter_native_splash:
  color: "#FFFFFF"
  image: assets/images/splash.png
  # 🎯 이 설정들이 안드로이드 찌그러짐을 방지해!
  android_gravity: center 
  fullscreen: false 

  android_12:
    image: assets/images/splash.png
    icon_background_color: "#FFFFFF"
    # 안드로이드 12는 이 설정을 특히 중요하게 봐
    image_dark: assets/images/splash.png